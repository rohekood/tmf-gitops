apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: tmf-selfsigned-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tmf-platform-tls
  namespace: tmf
spec:
  secretName: tmf-platform-tls
  dnsNames:
    - tmf.home.arpa
  issuerRef:
    name: tmf-selfsigned-issuer
    kind: ClusterIssuer
