apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: tmf-platform
  namespace: tmf
spec:
  interval: 5m
  chart:
    spec:
      chart: ./releases/charts/tmf-platform
      sourceRef:
        kind: GitRepository
        name: tmf-ai-demo
        namespace: flux-system
  values:
    bff:
      enabled: true
      image:
        tag: demo-ui-v0.20.0-bff # {"$imagepolicy": "flux-system:bff:tag"}
      env:
        secretName: bff-secrets
        auth0:
          secretName: bff-secrets
          domainKey: AUTH0_DOMAIN
          audienceKey: AUTH0_AUDIENCE
        extra:
          - name: RABBITMQ_PASSIVE_DECLARE
            value: "true"
    customer-management:
      enabled: true
      image:
        tag: customer-management-v0.5.0 # {"$imagepolicy": "flux-system:customer-management:tag"}
      env:
        secretName: customer-management-secrets
        extra:
          - name: RABBITMQ_PASSIVE_DECLARE
            value: "true"
    demo-ui:
      enabled: true
      image:
        tag: demo-ui-v0.20.0-ui # {"$imagepolicy": "flux-system:demo-ui:tag"}
      service:
        type: ClusterIP
        port: 80
      env:
        secretName: demo-ui-secrets
        auth0DomainKey: AUTH0_DOMAIN
        auth0ClientIdKey: AUTH0_CLIENT_ID
        auth0AudienceKey: AUTH0_AUDIENCE
        apiUrl: ""
        apiBaseUrl: ""
        bffHost: "tmf-platform-bff"
    emissary:
      enabled: false
      # Optional: set hostname (DNS/IP) to require Host header matching.
      hostname: ""
      createHost: false
      mapping:
        apiPrefix: /api/
        uiPrefix: /
    party-management:
      enabled: true
      image:
        tag: party-management-v0.5.0 # {"$imagepolicy": "flux-system:party-management:tag"}
      env:
        secretName: party-management-secrets
        extra:
          - name: RABBITMQ_PASSIVE_DECLARE
            value: "true"
    pocv:
      enabled: true
      image:
        tag: pocv-v0.5.3 # {"$imagepolicy": "flux-system:pocv:tag"}
      env:
        secretName: pocv-secrets
        extra:
          - name: RABBITMQ_PASSIVE_DECLARE
            value: "true"
    product-catalog-management:
      enabled: true
      image:
        tag: product-catalog-management-v0.6.0 # {"$imagepolicy": "flux-system:product-catalog-management:tag"}
      env:
        secretName: product-catalog-management-secrets
        extra:
          - name: RABBITMQ_PASSIVE_DECLARE
            value: "true"
    qualification:
      enabled: true
      image:
        tag: qualification-v0.5.1 # {"$imagepolicy": "flux-system:qualification:tag"}
      env:
        secretName: qualification-secrets
        redisAddr: 192.168.10.254:6379
        extra:
          - name: RABBITMQ_PASSIVE_DECLARE
            value: "true"
    shopping-cart:
      enabled: true
      image:
        tag: shopping-cart-v0.5.2 # {"$imagepolicy": "flux-system:shopping-cart:tag"}
      env:
        secretName: shopping-cart-secrets
        extra:
          - name: RABBITMQ_PASSIVE_DECLARE
            value: "true"
