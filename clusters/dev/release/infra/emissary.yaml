apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: emissary
  namespace: flux-system
spec:
  targetNamespace: emissary-system
  interval: 5m
  chart:
    spec:
      chart: emissary-ingress
      version: "8.*"
      sourceRef:
        kind: HelmRepository
        name: emissary-ingress
        namespace: flux-system
  install:
    createNamespace: true
  values:
    service:
      type: LoadBalancer
      annotations:
        metallb.universe.tf/address-pool: emissary-pool
