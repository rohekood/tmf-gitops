apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: emissary-crds
  namespace: flux-system
spec:
  targetNamespace: emissary-system
  interval: 5m
  chart:
    spec:
      chart: emissary-crds-chart
      version: "4.0.1"
      sourceRef:
        kind: HelmRepository
        name: emissary-ingress
        namespace: flux-system
  install:
    createNamespace: true
