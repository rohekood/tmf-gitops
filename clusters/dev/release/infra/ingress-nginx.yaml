apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: flux-system
spec:
  targetNamespace: ingress-nginx
  interval: 5m
  chart:
    spec:
      chart: ingress-nginx
      version: "4.10.0"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
  install:
    createNamespace: true
  values:
    controller:
      ingressClassResource:
        name: nginx
        enabled: true
        default: true
      ingressClass: nginx
      service:
        type: LoadBalancer
        annotations:
          metallb.universe.tf/address-pool: ingress-nginx-pool
