---
apiVersion: rabbitmq.com/v1beta1
kind: Binding
metadata:
  name: customer-dlq-to-dlx
  namespace: tmf
spec:
  source: tmf.dlx
  destination: customer.dlq
  destinationType: queue
  vhost: tmf
  routingKey: ""
  rabbitmqClusterReference:
    connectionSecret:
      name: rabbitmq-topology-credentials
