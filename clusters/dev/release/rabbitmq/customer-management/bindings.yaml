---
# RPC binding: customer_rpc_queue handles synchronous query.customer.get requests.
apiVersion: rabbitmq.com/v1beta1
kind: Binding
metadata:
  name: customer-rpc-get
  namespace: tmf
spec:
  source: customer.events
  destination: customer_rpc_queue
  destinationType: queue
  vhost: tmf
  routingKey: query.customer.get
  rabbitmqClusterReference:
    connectionSecret:
      name: rabbitmq-topology-credentials
