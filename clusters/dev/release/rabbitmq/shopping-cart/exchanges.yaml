---
# Cart commands, cart RPC, and checkout submission.
apiVersion: rabbitmq.com/v1beta1
kind: Exchange
metadata:
  name: ex-domain-commerce
  namespace: tmf
spec:
  name: ex.domain.commerce
  type: topic
  durable: true
  autoDelete: false
  vhost: tmf
  rabbitmqClusterReference:
    connectionSecret:
      name: rabbitmq-topology-credentials
---
# Receives catalog offering events for cart price-sync.
apiVersion: rabbitmq.com/v1beta1
kind: Exchange
metadata:
  name: ex-domain-catalog
  namespace: tmf
spec:
  name: ex.domain.catalog
  type: topic
  durable: true
  autoDelete: false
  vhost: tmf
  rabbitmqClusterReference:
    connectionSecret:
      name: rabbitmq-topology-credentials
