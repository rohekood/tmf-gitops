# Receives all events from catalog_events exchange for WebSocket fan-out to connected browsers.
apiVersion: rabbitmq.com/v1beta1
kind: Queue
metadata:
  name: q-bff-events
  namespace: tmf
spec:
  name: q.bff.events
  durable: true
  autoDelete: false
  vhost: tmf
  rabbitmqClusterReference:
    connectionSecret:
      name: rabbitmq-topology-credentials
