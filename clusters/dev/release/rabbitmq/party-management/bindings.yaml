---
apiVersion: rabbitmq.com/v1beta1
kind: Binding
metadata:
  name: party-dlq-to-dlx
  namespace: tmf
spec:
  source: tmf.dlx
  destination: party.dlq
  destinationType: queue
  vhost: tmf
  routingKey: ""
  rabbitmqClusterReference:
    connectionSecret:
      name: rabbitmq-topology-credentials
