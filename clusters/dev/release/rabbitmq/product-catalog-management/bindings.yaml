---
apiVersion: rabbitmq.com/v1beta1
kind: Binding
metadata:
  name: catalog-commands-catalog-wildcard
  namespace: tmf
spec:
  source: catalog_events
  destination: catalog_commands
  destinationType: queue
  vhost: tmf
  routingKey: "cmd.catalog.catalog.*"
  rabbitmqClusterReference:
    connectionSecret:
      name: rabbitmq-topology-credentials
