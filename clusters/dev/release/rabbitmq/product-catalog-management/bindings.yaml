---
apiVersion: rabbitmq.com/v1beta1
kind: Binding
metadata:
  name: catalog-commands-catalog-wildcard
  namespace: tmf
spec:
  source: catalog_events
  destination: catalog_commands
  destinationType: queue
  vhost: tmf
  routingKey: "cmd.catalog.catalog.*"
  rabbitmqClusterReference:
    connectionSecret:
      name: rabbitmq-topology-credentials
---
apiVersion: rabbitmq.com/v1beta1
kind: Binding
metadata:
  name: catalog-commands-category-wildcard
  namespace: tmf
spec:
  source: catalog_events
  destination: catalog_commands
  destinationType: queue
  vhost: tmf
  routingKey: "cmd.catalog.category.*"
  rabbitmqClusterReference:
    connectionSecret:
      name: rabbitmq-topology-credentials
---
apiVersion: rabbitmq.com/v1beta1
kind: Binding
metadata:
  name: catalog-commands-specification-wildcard
  namespace: tmf
spec:
  source: catalog_events
  destination: catalog_commands
  destinationType: queue
  vhost: tmf
  routingKey: "cmd.catalog.specification.*"
  rabbitmqClusterReference:
    connectionSecret:
      name: rabbitmq-topology-credentials
---
apiVersion: rabbitmq.com/v1beta1
kind: Binding
metadata:
  name: catalog-commands-offering-wildcard
  namespace: tmf
spec:
  source: catalog_events
  destination: catalog_commands
  destinationType: queue
  vhost: tmf
  routingKey: "cmd.catalog.offering.*"
  rabbitmqClusterReference:
    connectionSecret:
      name: rabbitmq-topology-credentials
---
# catalog_queries handles non-offering queries (catalog, category, specification).
# These three bindings intentionally exclude query.catalog.offering.# to avoid
# double-delivery with catalog-rpc-offering-wildcard below.
apiVersion: rabbitmq.com/v1beta1
kind: Binding
metadata:
  name: catalog-queries-catalog-wildcard
  namespace: tmf
spec:
  source: catalog_events
  destination: catalog_queries
  destinationType: queue
  vhost: tmf
  routingKey: "query.catalog.catalog.#"
  rabbitmqClusterReference:
    connectionSecret:
      name: rabbitmq-topology-credentials
---
apiVersion: rabbitmq.com/v1beta1
kind: Binding
metadata:
  name: catalog-queries-category-wildcard
  namespace: tmf
spec:
  source: catalog_events
  destination: catalog_queries
  destinationType: queue
  vhost: tmf
  routingKey: "query.catalog.category.#"
  rabbitmqClusterReference:
    connectionSecret:
      name: rabbitmq-topology-credentials
---
apiVersion: rabbitmq.com/v1beta1
kind: Binding
metadata:
  name: catalog-queries-specification-wildcard
  namespace: tmf
spec:
  source: catalog_events
  destination: catalog_queries
  destinationType: queue
  vhost: tmf
  routingKey: "query.catalog.specification.#"
  rabbitmqClusterReference:
    connectionSecret:
      name: rabbitmq-topology-credentials
---
# RPC binding: handles synchronous offering queries from BFF and qualification.
# Exclusive — query.catalog.offering.# is NOT bound to catalog_queries.
apiVersion: rabbitmq.com/v1beta1
kind: Binding
metadata:
  name: catalog-rpc-offering-wildcard
  namespace: tmf
spec:
  source: catalog_events
  destination: catalog_rpc_queue
  destinationType: queue
  vhost: tmf
  routingKey: "query.catalog.offering.#"
  rabbitmqClusterReference:
    connectionSecret:
      name: rabbitmq-topology-credentials
