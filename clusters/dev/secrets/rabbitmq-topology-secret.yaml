# Credentials for the RabbitMQ Messaging Topology Operator to reach the
# external broker's management HTTP API. The user must have the
# "administrator" tag on the target vhost.
#
# Do NOT commit real passwords — replace with Sealed Secrets or SOPS.
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-topology-credentials
  namespace: tmf
type: Opaque
stringData:
  # Full HTTP management API URL — password must be URL-encoded.
  # Format: http://user:urlencoded-password@host:port
  # Use `python3 -c "import urllib.parse; print(urllib.parse.quote('PASS', safe=''))"` to encode.
  uri: "REPLACE_WITH_http://user:urlencoded-password@192.168.10.254:15672"
