apiVersion: image.toolkit.fluxcd.io/v1beta1
kind: ImagePolicy
metadata:
  name: customer-management
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: customer-management
  filterTags:
    pattern: "^customer-management-v(.*)$"
    extract: "$1"
  policy:
    semver:
      range: ">=0.0.0-0"
